<!doctype html>
<html lang="es">
<head><meta charset="utf-8"><title>Recordatorio de tu cita</title></head>
<body style="font-family: system-ui, sans-serif; max-width: 600px; margin: 0 auto; padding: 24px;">
  <h1 style="color:#ea580c;">Hola {{ nombre }}, tu cita es mañana</h1>
  <p><strong>Fecha:</strong> {{ fecha }}</p>
  <p><strong>Hora:</strong> {{ hora }}</p>
  <p>Te esperamos. Si necesitas cancelar, hazlo desde tu cuenta.</p>
</body>
</html>
