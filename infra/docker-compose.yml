services:
  redis:
    image: redis:7-alpine
    container_name: appsalon-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # UI para inspeccionar Redis (opcional, útil en dev)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: appsalon-redis-ui
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"

  # UI para inspeccionar Celery (opcional, muy útil en dev)
  flower:
    image: mher/flower:latest
    container_name: appsalon-flower
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
    ports:
      - "5555:5555"

volumes:
  redis_data:
