resolver 8.8.8.8 1.1.1.1 ipv6=off valid=300s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Proxy a Supabase para evitar CORS — el Kong del Supabase self-hosted
    # no permite el header x-supabase-api-version que manda supabase-js.
    # El browser ve /supabase/* como mismo origen (sin preflight problemático).
    location /supabase/ {
        proxy_pass https://iagenteksupabase.iagentek.com.mx/;
        proxy_set_header Host iagenteksupabase.iagentek.com.mx;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # cache de assets con hash
    location ~* \.(js|css|woff2?|ttf|png|jpg|jpeg|gif|svg|webp|avif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html: sin cache
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
